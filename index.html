<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>元素周期表 · 中日对照 | 周期表 · 中日対照</title>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-3: #898781;
    --hairline: #e1e0d9;
    --ring: rgba(11,11,11,0.10);
    --acc-alkali-metal: #e34948;
    --acc-alkaline-earth-metal: #eda100;
    --acc-transition-metal: #2a78d6;
    --acc-post-transition-metal: #1baf7a;
    --acc-metalloid: #4a3aa7;
    --acc-nonmetal: #008300;
    --acc-halogen: #e87ba4;
    --acc-noble-gas: #eb6834;
    --acc-lanthanide: #0891b2;
    --acc-actinide: #b45309;
    --acc-unknown: #8b8983;
    --mix: 13%;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --ink-1: #ffffff;
      --ink-2: #c3c2b7;
      --ink-3: #898781;
      --hairline: #2c2c2a;
      --ring: rgba(255,255,255,0.10);
      --acc-alkali-metal: #e66767;
      --acc-alkaline-earth-metal: #c98500;
      --acc-transition-metal: #3987e5;
      --acc-post-transition-metal: #0e7f56;
      --acc-metalloid: #a76fd9;
      --acc-nonmetal: #2e9e2e;
      --acc-halogen: #d55181;
      --acc-noble-gas: #d95926;
      --acc-lanthanide: #1ca3c9;
      --acc-actinide: #b05f2a;
      --acc-unknown: #8b8983;
      --mix: 22%;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 20px 48px; background: var(--page); color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
  }
  :lang(ja) {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans CJK JP", "PingFang SC", sans-serif;
  }
  header { max-width: 1400px; margin: 0 auto 18px; display: flex; flex-wrap: wrap; gap: 20px 36px; align-items: flex-end; }
  h1 { font-size: 26px; margin: 0 0 4px; letter-spacing: .5px; }
  h1 .ja-title { color: var(--ink-2); font-size: 17px; font-weight: 500; margin-left: 10px; }
  .subtitle { color: var(--ink-2); font-size: 13px; margin: 0; }
  .anatomy { display: flex; gap: 10px; align-items: center; font-size: 11px; color: var(--ink-2); }
  .anatomy .cell { width: 88px; cursor: default; }
  .anatomy ul { list-style: none; margin: 0; padding: 0; line-height: 1.75; }
  .wrap { max-width: 1400px; margin: 0 auto; overflow-x: auto; padding-bottom: 6px; }
  .grid {
    display: grid; min-width: 1510px;
    grid-template-columns: 26px repeat(18, minmax(78px, 1fr));
    grid-template-rows: 20px repeat(7, 110px) 18px repeat(2, 110px);
    gap: 4px;
  }
  .glabel, .plabel { color: var(--ink-3); font-size: 10.5px; display: flex; align-items: center; justify-content: center; }
  .cell {
    position: relative; background: color-mix(in srgb, var(--acc) var(--mix), var(--surface-1));
    border: 1px solid var(--ring); border-top: 3px solid var(--acc); border-radius: 4px;
    padding: 20px 5px 3px; overflow: hidden; cursor: default; outline-offset: 1px;
  }
  .cell:hover, .cell:focus-visible { border-color: var(--acc); box-shadow: 0 1px 6px var(--ring); z-index: 2; }
  .cell .num { position: absolute; top: 3px; left: 5px; font-size: 12px; color: var(--ink-2); }
  .cell .mass { position: absolute; top: 3px; right: 5px; font-size: 12px; color: var(--ink-2); }
  .cell .sym { font-size: 26px; font-weight: 700; line-height: 1.08; }
  .cell .zh { font-size: 17px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell .zh .py { font-size: 10.5px; color: var(--ink-2); margin-left: 3px; }
  .cell .ja { font-size: 12.5px; color: var(--ink-2); margin-top: 1px; line-height: 1.18;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .cell.marker { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 3px; text-align: center; }
  .cell.marker .rng { font-size: 13px; font-weight: 600; }
  .cell.marker .lbl { font-size: 11px; color: var(--ink-2); line-height: 1.35; }
  #tip {
    position: fixed; display: none; z-index: 10; max-width: 300px; pointer-events: none;
    background: var(--surface-1); border: 1px solid var(--hairline); border-top: 3px solid var(--acc, var(--hairline));
    border-radius: 6px; box-shadow: 0 4px 18px rgba(0,0,0,.18); padding: 10px 12px; font-size: 12px;
  }
  #tip h3 { margin: 0 0 6px; font-size: 15px; }
  #tip h3 small { color: var(--ink-2); font-weight: 500; margin-left: 6px; }
  #tip table { border-collapse: collapse; }
  #tip td { padding: 1.5px 0; vertical-align: top; }
  #tip td:first-child { color: var(--ink-3); padding-right: 12px; white-space: nowrap; }
  .legend { max-width: 1400px; margin: 16px auto 0; display: flex; flex-wrap: wrap; gap: 7px 18px; font-size: 12px; color: var(--ink-2); }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .chip { width: 11px; height: 11px; border-radius: 3px; background: var(--acc); border: 1px solid var(--ring); }
  details.tableview { max-width: 1400px; margin: 26px auto 0; font-size: 13px; }
  details.tableview summary { cursor: pointer; color: var(--ink-2); }
  details.tableview table { border-collapse: collapse; margin-top: 12px; width: 100%; }
  details.tableview th, details.tableview td { border-bottom: 1px solid var(--hairline); padding: 5px 10px; text-align: left; font-weight: normal; }
  details.tableview th { color: var(--ink-3); font-size: 11.5px; }
  details.tableview td:first-child { font-variant-numeric: tabular-nums; }
  footer { max-width: 1400px; margin: 26px auto 0; color: var(--ink-3); font-size: 11.5px; line-height: 1.6; }
</style>
</head>

</footer>

<script>
const ELEMENTS = JSON.parse(document.getElementById('data').textContent);
const CATS = {
  'alkali-metal':          { zh: '碱金属',   ja: 'アルカリ金属' },
  'alkaline-earth-metal':  { zh: '碱土金属', ja: 'アルカリ土類金属' },
  'transition-metal':      { zh: '过渡金属', ja: '遷移金属' },
  'post-transition-metal': { zh: '后过渡金属', ja: 'ポスト遷移金属' },
  'metalloid':             { zh: '类金属',   ja: '半金属' },
  'nonmetal':              { zh: '非金属',   ja: '非金属' },
  'halogen':               { zh: '卤素',     ja: 'ハロゲン' },
  'noble-gas':             { zh: '稀有气体', ja: '貴ガス' },
  'lanthanide':            { zh: '镧系',     ja: 'ランタノイド' },
  'actinide':              { zh: '锕系',     ja: 'アクチノイド' },
  'unknown':               { zh: '性质未知', ja: '特性未知' },
};

function pos(n) {
  if (n === 1) return [1, 1];
  if (n === 2) return [1, 18];
  if (n <= 4)  return [2, n - 2];
  if (n <= 10) return [2, n + 8];
  if (n <= 12) return [3, n - 10];
  if (n <= 18) return [3, n];
  if (n <= 36) return [4, n - 18];
  if (n <= 54) return [5, n - 36];
  if (n <= 56) return [6, n - 54];
  if (n <= 71) return [9, n - 53];   // lanthanides
  if (n <= 86) return [6, n - 68];
  if (n <= 88) return [7, n - 86];
  if (n <= 103) return [10, n - 85]; // actinides
  return [7, n - 100];
}

const grid = document.getElementById('grid');
for (let g = 1; g <= 18; g++) {
  const d = document.createElement('div');
  d.className = 'glabel'; d.textContent = g;
  d.style.gridRow = 1; d.style.gridColumn = g + 1;
  grid.appendChild(d);
}
for (let p = 1; p <= 7; p++) {
  const d = document.createElement('div');
  d.className = 'plabel'; d.textContent = p;
  d.style.gridRow = p + 1; d.style.gridColumn = 1;
  grid.appendChild(d);
}
for (const [row, col, rng, cat] of [[6, 3, '57–71', 'lanthanide'], [7, 3, '89–103', 'actinide']]) {
  const d = document.createElement('div');
  d.className = 'cell marker';
  d.style.setProperty('--acc', `var(--acc-${cat})`);
  d.style.gridRow = row + 1; d.style.gridColumn = col + 1;
  d.innerHTML = `<div class="rng">${rng}</div><div class="lbl">${CATS[cat].zh}<br><span lang="ja">${CATS[cat].ja}</span></div>`;
  grid.appendChild(d);
}

const tip = document.getElementById('tip');
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

for (const e of ELEMENTS) {
  const [row, col] = pos(e.number);
  const d = document.createElement('div');
  d.className = 'cell'; d.tabIndex = 0; d.setAttribute('role', 'gridcell');
  d.style.setProperty('--acc', `var(--acc-${e.category})`);
  d.style.gridRow = row + 1; d.style.gridColumn = col + 1;
  const kanaLine = e.kana !== e.name_ja ? ` <span class="py" lang="ja">${esc(e.kana)}</span>` : '';
  d.innerHTML =
    `<div class="num">${e.number}</div><div class="mass">${esc(e.mass)}</div>` +
    `<div class="sym">${esc(e.symbol)}</div>` +
    `<div class="zh">${esc(e.name_zh)}<span class="py">${esc(e.pinyin)}</span></div>` +
    `<div class="ja" lang="ja" title="${esc(e.name_ja)}">${esc(e.name_ja)}${kanaLine}</div>`;
  d.setAttribute('aria-label', `${e.number} ${e.symbol} ${e.name_zh} ${e.name_ja}`);
  d.addEventListener('pointerenter', ev => showTip(e, ev));
  d.addEventListener('pointermove', ev => moveTip(ev.clientX, ev.clientY));
  d.addEventListener('pointerleave', hideTip);
  d.addEventListener('focus', () => { const r = d.getBoundingClientRect(); showTip(e, null); moveTip(r.right, r.top); });
  d.addEventListener('blur', hideTip);
  grid.appendChild(d);
}

function showTip(e, ev) {
  const c = CATS[e.category];
  tip.style.setProperty('--acc', `var(--acc-${e.category})`);
  tip.innerHTML = `<h3>${e.number} · ${esc(e.symbol)}<small>${esc(e.name_en)}</small></h3><table>` +
    `<tr><td>中文名</td><td>${esc(e.name_zh)}(${esc(e.pinyin)})</td></tr>` +
    `<tr><td lang="ja">日本語名</td><td lang="ja">${esc(e.name_ja)}(${esc(e.kana)})</td></tr>` +
    `<tr><td>原子量</td><td>${esc(e.mass)}</td></tr>` +
    `<tr><td>类别 · <span lang="ja">分類</span></td><td>${c.zh} · <span lang="ja">${c.ja}</span></td></tr>` +
    `<tr><td>族 / 周期</td><td>${e.group} / ${e.period}</td></tr></table>`;
  tip.style.display = 'block';
  if (ev) moveTip(ev.clientX, ev.clientY);
}
function moveTip(x, y) {
  const r = tip.getBoundingClientRect();
  tip.style.left = Math.min(x + 14, window.innerWidth - r.width - 8) + 'px';
  tip.style.top = Math.min(y + 14, window.innerHeight - r.height - 8) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

const legend = document.getElementById('legend');
for (const [key, c] of Object.entries(CATS)) {
  const d = document.createElement('div');
  d.className = 'item'; d.style.setProperty('--acc', `var(--acc-${key})`);
  d.innerHTML = `<span class="chip"></span>${c.zh} · <span lang="ja">${c.ja}</span>`;
  legend.appendChild(d);
}

const table = document.getElementById('datatable');
table.innerHTML = '<tr><th>No.</th><th>符号</th><th>中文名(拼音)</th><th lang="ja">日本語名(読み)</th><th>English</th><th>原子量</th><th>类别 · <span lang="ja">分類</span></th><th>族</th><th>周期</th></tr>' +
  ELEMENTS.map(e => `<tr><td>${e.number}</td><td>${esc(e.symbol)}</td><td>${esc(e.name_zh)}(${esc(e.pinyin)})</td>` +
    `<td lang="ja">${esc(e.name_ja)}(${esc(e.kana)})</td><td>${esc(e.name_en)}</td><td>${esc(e.mass)}</td>` +
    `<td>${CATS[e.category].zh} · <span lang="ja">${CATS[e.category].ja}</span></td><td>${e.group}</td><td>${e.period}</td></tr>`).join('');
</script>
</body>
</html>
